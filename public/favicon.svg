  <line x1="50" y1="72" x2="50" y2="38" stroke="#6B8070" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="65" y2="45" stroke="#6B8070" stroke-width="2.5" stroke-linecap="round"/>
  <!-- leaves -->
